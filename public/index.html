<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whiteboard Colaborativo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="ui-container">
        <h1>Sistemas Distribuídos</h1>
        <p>Conectado como: <span id="my-color-indicator"></span></p>
        <div id="toolbar">
            <input type="color" id="color-picker" title="Escolha sua cor" value="#ffffff">
            <button id="btn-clear" title="Limpar Tela para Todos">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>
                Limpar Tela
            </button>
        </div>
        <div id="notifications"></div>
    </div>
    
    <!-- Sidebar do Chat -->
    <div id="chat-sidebar">
        <div id="chat-header">
            <h2>Chat Global</h2>
        </div>
        <div id="chat-messages"></div>
        <form id="chat-form">
            <input type="text" id="chat-input" placeholder="Mensagem..." autocomplete="off" required>
            <button type="submit" id="btn-send-chat">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </form>
    </div>

    <!-- Canvas para o desenho livre -->
    <canvas id="whiteboard"></canvas>
    
    <!-- Container para armazenar os cursores dos outros usuários -->
    <div id="cursors-container"></div>

    <script src="script.js"></script>
</body>
</html>
